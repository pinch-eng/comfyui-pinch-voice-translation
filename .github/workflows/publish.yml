name: Publish to ComfyUI Registry
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ltdrdata/publish-comfyui-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_TOKEN }}
